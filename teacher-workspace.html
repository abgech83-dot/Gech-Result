		<div class="relative w-full max-w-md no-print">

</div>
            <button id="toggleViewModeBtn" onclick="toggleAssessmentMode()" class="text-sm bg-amber-500 hover:bg-amber-600 px-4 py-1.5 rounded cursor-pointer font-bold shadow text-gray-900 transition flex items-center gap-1">
                🔄Contineous Assessment

        </div>

    <div id="workspaceContainer" class="w-full max-w-6xl mx-auto my-8 px-4 space-y-6 transition-all duration-300">

                    <span id="statBelow" class="text-3xl font-extrabold text-red-600">0</span>

            </div>

                </div>

            </div>

                        </label>

                    <table class="w-full text-left text-sm border-collapse">

                        <tbody id="studentTableBody">

                        </tbody>

                <div class="flex justify-end space-x-3 pt-4 border-t">
                    <button id="saveLocalBtn" class="bg-blue-500 text-white font-bold px-5 py-2 rounded shadow hover:bg-blue-600 cursor-pointer text-sm">💾 Save Changes as Draft</button>
                    <button id="sendReportBtn" class="bg-emerald-600 text-white font-bold px-5 py-2 rounded shadow hover:bg-emerald-700 cursor-pointer text-sm">🚀 Dispatch Report to Administration</button>
                </div>
            </div>

    <script src="app.js"></script>
    <script>
        const auth = JSON.parse(sessionStorage.getItem('currentUser'));
if(!auth || auth.role !== 'teacher') window.location.href = 'login.html';
        
const teacherSubject = auth.subject || "English"; 
document.getElementById('teacherName').innerText = auth.name;
document.getElementById('teacherSubject').innerText = teacherSubject.replace(/_/g, ' ');

let activelyLoadedStudents = [];
let detailedBreakdownMode = false; // Initial mode defaults to simple configuration view

// Mode Toggler Execution
function toggleAssessmentMode() {
    detailedBreakdownMode = !detailedBreakdownMode;
    const toggleBtn = document.getElementById('toggleViewModeBtn');
    const container = document.getElementById('workspaceContainer');

    if(detailedBreakdownMode) {
        toggleBtn.innerText = "🔄 Switch to Simple Score Mode";
        toggleBtn.className = "text-sm bg-blue-500 hover:bg-blue-600 px-4 py-1.5 rounded cursor-pointer font-bold shadow text-white transition flex items-center gap-1";
        container.className = "w-full max-w-[96%] mx-auto my-8 px-4 space-y-6 transition-all duration-300";
    } else {
        toggleBtn.innerText = "🔄 Switch to Detailed Breakdown Mode";
        toggleBtn.className = "text-sm bg-amber-500 hover:bg-amber-600 px-4 py-1.5 rounded cursor-pointer font-bold shadow text-gray-900 transition flex items-center gap-1";
        container.className = "w-full max-w-6xl mx-auto my-8 px-4 space-y-6 transition-all duration-300";
    }

    // Rerender list dynamically keeping current fields data state
    const grade = document.getElementById('workGrade').value;
    const stream = document.getElementById('workStream').value;
    if(activelyLoadedStudents.length > 0) {
        renderTable(grade, stream);
    }
}

// Live Row Evaluator used during detailed entry computations
function updateLiveRowTotals(username) {
    if(!detailedBreakdownMode) return;
    const getVal = (id) => parseFloat(document.getElementById(`${id}-${username}`).value) || 0;
    
    const totalCA = getVal('cw') + getVal('hw') + getVal('cp') + getVal('eb') + getVal('ht') + getVal('qz') + getVal('ga') + getVal('proj') + getVal('ia') + getVal('ue');
    document.getElementById(`totalCA-${username}`).innerText = totalCA.toFixed(1);

    const totalEx = getVal('mid') + getVal('fin');
    document.getElementById(`totalEx-${username}`).innerText = totalEx.toFixed(1);

    document.getElementById(`grandTotal-${username}`).innerText = (totalCA + totalEx).toFixed(0);
}

// Async Benchmark Calculations connected directly to Supabase Context drivers
async function calculatePerformanceBenchmarks(currentClassKey, selectedGender) {
    // Await async responses from backend cloud infrastructure
    const results = await window.DB.getResults();
    const users = await window.DB.getUsers();

    const targetClassUsernames = users
        .filter(u => u.role === 'student' && u.classKey === currentClassKey && (selectedGender === 'All' || String(u.gender || '').toLowerCase() === selectedGender.toLowerCase()))
        .map(u => u.username);

    const classResults = results.filter(r => r.subject === teacherSubject && targetClassUsernames.includes(r.username));

    let belowCount = 0, satisfactoryCount = 0, excellentCount = 0;

    classResults.forEach(r => {
        let score = 0;
        if (r.breakdown) {
            // Support object structures parsed dynamically from storage columns
            const currentBreakdown = typeof r.breakdown === 'string' ? JSON.parse(r.breakdown) : r.breakdown;
            score = Object.values(currentBreakdown).reduce((sum, v) => sum + (parseFloat(v) || 0), 0);
        } else {
            score = parseFloat(r.score) || 0;
        }

        if (!isNaN(score)) {
            if (score < 50) belowCount++;
            else if (score >= 50 && score <= 74) satisfactoryCount++;
            else if (score >= 75) excellentCount++;
        }
    });

    document.getElementById('statBelow').innerText = belowCount;
    document.getElementById('statSatisfactory').innerText = satisfactoryCount;
    document.getElementById('statExcellent').innerText = excellentCount;
}

// Student Loading Handler converted to run asynchronously
document.getElementById('loadStudentsBtn').addEventListener('click', async () => {
    const grade = document.getElementById('workGrade').value;
    const stream = document.getElementById('workStream').value;
    const section = document.getElementById('workSection').value;
    const selectedGender = document.getElementById('workGenderFilter').value;

    let queryKey = (parseInt(grade) >= 11 && stream !== 'None') ? `${grade}-${stream}${section}` : `${grade}${section}`;
    document.getElementById('segmentKey').innerText = queryKey + (selectedGender !== 'All' ? ` (${selectedGender}s)` : '');

    const tBody = document.getElementById('studentTableBody');
    tBody.innerHTML = `<tr><td colspan="18" class="p-4 text-center text-slate-500 font-medium">⏳ Syncing with Cloud Database Layer...</td></tr>`;

    const allUsers = await window.DB.getUsers();
    const reports = await window.DB.getReports() || [];
    const dispatchedUsernames = [];
    
    reports.filter(rep => rep.teacher === auth.name && rep.segment === queryKey).forEach(rep => {
        const reportData = typeof rep.data === 'string' ? JSON.parse(rep.data) : rep.data;
        if(reportData) reportData.forEach(item => dispatchedUsernames.push(item.username));
    });

    activelyLoadedStudents = allUsers.filter(u => u.role === 'student' && u.classKey === queryKey && !dispatchedUsernames.includes(u.username));
    if (selectedGender !== 'All') {
        activelyLoadedStudents = activelyLoadedStudents.filter(u => String(u.gender || '').toLowerCase() === selectedGender.toLowerCase());
    }

    await renderTable(grade, stream);
    await calculatePerformanceBenchmarks(queryKey, selectedGender);
});

// Asynchronous UI Table Generation Engine
async function renderTable(grade, stream) {
    const tHead = document.getElementById('studentTableHeader');
    const tBody = document.getElementById('studentTableBody');
    
    tHead.innerHTML = '';
    tBody.innerHTML = '';

    if (activelyLoadedStudents.length === 0) {
        const totalCols = detailedBreakdownMode ? 18 : 6;
        tBody.innerHTML = `<tr><td colspan="${totalCols}" class="p-4 text-center text-gray-400 text-sm">No active draft students found matching parameters. Items may be dispatched or unassigned.</td></tr>`;
        return;
    }

    const lookupKey = (parseInt(grade) >= 11) ? `${grade}-${stream}` : grade;
    if (!(CourseMap[lookupKey] || []).includes(teacherSubject)) {
        const totalCols = detailedBreakdownMode ? 18 : 6;
        tBody.innerHTML = `<tr><td colspan="${totalCols}" class="p-4 text-center text-amber-600 font-medium bg-amber-50 text-sm rounded-md">Your assigned subject (${teacherSubject.replace(/_/g, ' ')}) is not taught in ${lookupKey}.</td></tr>`;
        return;
    }

    // Await live scores from backend cloud context driver
    const currentResults = await window.DB.getResults();

    if (!detailedBreakdownMode) {
        tHead.innerHTML = `
            <tr class="bg-gray-100 border-b text-gray-600 uppercase text-xs">
                <th class="p-3">Username</th>
                <th class="p-3">Student Name</th>
                <th class="p-3">Gender</th>
                <th class="p-3">Course Module</th>
                <th class="p-3 w-32">Numeric Score</th>
                <th class="p-3 text-right">Actions</th>
            </tr>
        `;

        activelyLoadedStudents.forEach(stu => {
            const savedRecord = currentResults.find(r => r.username === stu.username && r.subject === teacherSubject) || {};
            let scoreVal = savedRecord.score !== undefined ? savedRecord.score : '';
            
            if(savedRecord.breakdown) {
                const bData = typeof savedRecord.breakdown === 'string' ? JSON.parse(savedRecord.breakdown) : savedRecord.breakdown;
                scoreVal = Object.values(bData).reduce((sum, v) => sum + (parseFloat(v) || 0), 0).toFixed(0);
            }

            const tr = document.createElement('tr');
            tr.className = "border-b hover:bg-gray-50 transition-colors text-gray-700 text-sm";
            tr.innerHTML = `
                <td class="p-3 font-mono text-xs font-bold text-gray-900">${stu.username}</td>
                <td class="p-3 font-medium">${stu.name}</td>
                <td class="p-3 text-xs text-gray-500 font-semibold">${stu.gender || '-'}</td>
                <td class="p-3 text-gray-600 font-semibold text-xs">${teacherSubject.replace(/_/g, ' ')}</td>
                <td class="p-3">
                    <input type="number" id="score-${stu.username}" data-user="${stu.username}" value="${scoreVal}" min="0" max="100" class="score-input w-20 border rounded p-1 text-center font-mono focus:ring-2 focus:ring-green-500 outline-none">
                </td>
                <td class="p-3 text-right">
                    <button onclick="deleteRowRecord('${stu.username}')" class="text-xs bg-red-100 hover:bg-red-200 text-red-700 font-bold px-2 py-1 rounded transition cursor-pointer">Clear</button>
                </td>
            `;
            tBody.appendChild(tr);
        });
    } else {
        tHead.innerHTML = `
            <tr class="bg-gray-100 border-b text-gray-600 uppercase font-mono text-[11px]">
                <th class="p-2 border">Username</th>
                <th class="p-2 border min-w-[140px]">Student Name</th>
                <th class="p-2 border text-center">Sex</th>
                <th class="p-1 border text-center bg-gray-50" title="Class Work">CW<br><span class="text-[9px] text-gray-400">2%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Home Work">HW<br><span class="text-[9px] text-gray-400">2%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Class Participation">CP<br><span class="text-[9px] text-gray-400">2%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Exercise Book">EB<br><span class="text-[9px] text-gray-400">2%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Home Task">HT<br><span class="text-[9px] text-gray-400">5%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Quiz">Qz<br><span class="text-[9px] text-gray-400">5%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Group Assignment">GA<br><span class="text-[9px] text-gray-400">4%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Project">Proj<br><span class="text-[9px] text-gray-400">4%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Individual Assignment">IA<br><span class="text-[9px] text-gray-400">4%</span></th>
                <th class="p-1 border text-center bg-gray-50" title="Unit Examination">UE<br><span class="text-[9px] text-gray-400">5%</span></th>
                <th class="p-2 border text-center font-bold bg-blue-50 text-blue-800">Total CA<br><span class="text-[9px]">35%</span></th>

                <th class="p-2 border text-right">Actions</th>

        activelyLoadedStudents.forEach(stu => {

            const b = (typeof rec.breakdown === 'string' ? JSON.parse(rec.breakdown) : rec.breakdown) || { cw:'', hw:'', cp:'', eb:'', ht:'', qz:'', ga:'', proj:'', ia:'', ue:'', mid:'', fin:'' };

                <td class="p-0.5 border"><input type="number" step="0.1" id="ga-${stu.username}" value="${b.ga||''}" max="4" class="w-10 border text-center p-1 breakdown-input" data-user="${stu.username}" oninput="updateLiveRowTotals('${stu.username}')"></td>

// Clear individual cloud entries asynchronously
async function deleteRowRecord(username) {
    if (confirm(`Clear this student's local draft scores completely?`)) {
        await window.DB.saveResult(username, teacherSubject, 0, null); // Wipe from Supabase
        alert("Draft data wiped cleanly.");
        document.getElementById('loadStudentsBtn').click();
    }
}

// Asynchronous score state matrix capture system
async function captureAndSaveScores() {
    let savedRecordsList = [];

    if (!detailedBreakdownMode) {
        const inputs = document.querySelectorAll('.score-input');
        for (const input of inputs) {
            const username = input.dataset.user;
            const score = parseFloat(input.value);

            if (!isNaN(score)) {
                const record = { username, subject: teacherSubject, score, status: 'draft', breakdown: null };
                await window.DB.saveResult(username, teacherSubject, score, null);
                savedRecordsList.push(record);
            }
        }
    } else {
        for (const stu of activelyLoadedStudents) {
            const getVal = (id) => parseFloat(document.getElementById(`${id}-${stu.username}`).value) || 0;
            
            const breakdown = {
                cw: getVal('cw'), hw: getVal('hw'), cp: getVal('cp'), eb: getVal('eb'),
                ht: getVal('ht'), qz: getVal('qz'), ga: getVal('ga'), proj: getVal('proj'),
                ia: getVal('ia'), ue: getVal('ue'), mid: getVal('mid'), fin: getVal('fin')
            };

            const totalScore = Object.values(breakdown).reduce((a, b) => a + b, 0);
            
            if(Object.values(breakdown).some(v => v > 0)) {
                const roundedScore = Math.round(totalScore);
                const record = { username: stu.username, subject: teacherSubject, score: roundedScore, breakdown, status: 'draft' };
                await window.DB.saveResult(stu.username, teacherSubject, roundedScore, breakdown);
                savedRecordsList.push(record);
            }
        }
    }
    return savedRecordsList;
}

// Save draft event trigger
document.getElementById('saveLocalBtn').addEventListener('click', async () => {
    const saveBtn = document.getElementById('saveLocalBtn');
    saveBtn.innerText = "⏳ Processing Saves...";
    saveBtn.disabled = true;

    const records = await captureAndSaveScores();
    
    saveBtn.innerText = "💾 Save Marks Draft";
    saveBtn.disabled = false;

    if (records.length > 0) {
        alert(`Successfully saved ${records.length} records securely to cloud storage.`);
        const currentSegment = document.getElementById('segmentKey').innerText.split(' ')[0];
        const selectedGender = document.getElementById('workGenderFilter').value;
        await calculatePerformanceBenchmarks(currentSegment, selectedGender);
    } else {
        alert('Please input numerical score components before running cloud database updates.');
    }
});

// Dispatch and Lock Report to Administration Module 
document.getElementById('sendReportBtn').addEventListener('click', async () => {
    const recordsSaved = await captureAndSaveScores();
    if (recordsSaved.length === 0) {
        return alert('Input valid score components before generating reports.');
    }

    if (confirm(`Are you sure you want to dispatch this report of ${recordsSaved.length} records to the Administration?`)) {
        const activeSegmentKey = document.getElementById('segmentKey').innerText.split(' ')[0]; 
        
        // Map elements to pending status arrays for database consistency logs
        const processedBatchRecords = recordsSaved.map(item => {
            item.status = 'pending';
            return item;
        });

        // Save generated structure log index to cloud schema index
        await window.DB.saveReport({
            id: 'REP-' + Date.now(),
            teacher: auth.name,
            segment: activeSegmentKey,
            date: new Date().toLocaleDateString(),
            data: processedBatchRecords,
            approved: false
        });

        alert('Report successfully dispatched! Records are locked and sent to the admin dashboard.');
        document.getElementById('loadStudentsBtn').click();
    }
});

// Export Routine Template Engine
document.getElementById('exportBtn').addEventListener('click', () => {
    if(activelyLoadedStudents.length === 0) return alert('Load class records before exporting spreadsheet templates.');
    
    let dataRows = [];
    if(!detailedBreakdownMode) {
        activelyLoadedStudents.forEach(s => {
            dataRows.push({ "Username": s.username, "Student Name": s.name, "Gender": s.gender || '-', "Subject": teacherSubject, "Score": "" });
        });
    } else {
        activelyLoadedStudents.forEach(s => {
            dataRows.push({ 
                "Username": s.username, "Student Name": s.name, "Sex": s.gender || '-', "Subject": teacherSubject,
                "CW": "", "HW": "", "CP": "", "EB": "", "HT": "", "Qz": "", "GA": "", "Proj": "", "IA": "", "UE": "", "Mid": "", "Fin": ""
            });
        });
    }

    const worksheet = XLSX.utils.json_to_sheet(dataRows);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Grade Sheet");
    XLSX.writeFile(workbook, `${teacherSubject}_Sheet_${document.getElementById('segmentKey').innerText.replace(/\s+/g, '')}.xlsx`);
});

// Excel Spreadsheet Importer Workflow Integration
document.getElementById('importFile').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = async (event) => {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const importedJSON = XLSX.utils.sheet_to_json(worksheet);

        let counts = 0;

        for (const row of importedJSON) {
            const username = row["Username"];
            const subject = row["Subject"] || teacherSubject;
            if (subject !== teacherSubject) continue;

            if(!detailedBreakdownMode) {
                const score = parseFloat(row["Score"]);
                if(username && !isNaN(score)) {
                    await window.DB.saveResult(username, teacherSubject, score, null);
                    counts++;
                }
            } else {
                if(username) {
                    const breakdown = {
                        cw: parseFloat(row["CW"]) || 0, hw: parseFloat(row["HW"]) || 0, cp: parseFloat(row["CP"]) || 0, eb: parseFloat(row["EB"]) || 0,
                        ht: parseFloat(row["HT"]) || 0, qz: parseFloat(row["Qz"]) || 0, ga: parseFloat(row["GA"]) || 0, proj: parseFloat(row["Proj"]) || 0,
                        ia: parseFloat(row["IA"]) || 0, ue: parseFloat(row["UE"]) || 0, mid: parseFloat(row["Mid"]) || 0, fin: parseFloat(row["Fin"]) || 0
                    };
                    const totalScore = Object.values(breakdown).reduce((a, b) => a + b, 0);
                    await window.DB.saveResult(username, teacherSubject, Math.round(totalScore), breakdown);
                    counts++;
                }
            }
        }

        alert(`Successfully parsed spreadsheet! Imported ${counts} records into drafts.`);
        document.getElementById('loadStudentsBtn').click();
    };
    reader.readAsArrayBuffer(file);
});

// Universal Safe Page Context Table row filtering method for Global Search Bar
function renderStudents(filterUsername = null) {
    if (!filterUsername) return;
    const rows = document.querySelectorAll('#studentTableBody tr');
    rows.forEach(row => {
        const usernameCell = row.querySelector('td');
        if (usernameCell) {
            const text = usernameCell.innerText.trim().toLowerCase();
            if (text === filterUsername.toLowerCase()) {
                row.style.display = "";
                row.classList.add('bg-yellow-50'); // Highlight row match visually
            } else {
                row.style.display = "none";
            }
        }
    });
}
