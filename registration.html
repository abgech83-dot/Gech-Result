<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Registration Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">
    <div class="bg-white max-w-lg mx-auto p-8 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">System User Registration</h2>
        <p class="text-center text-sm text-gray-500 mb-6">Generates structural role-based usernames automatically</p>
        
        <form id="regForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="fullName" required class="w-full border border-gray-300 rounded-md p-2">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
                    <input type="number" id="ageInput" required min="5" max="100" placeholder="e.g. 16" class="w-full border border-gray-300 rounded-md p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
                    <select id="genderSelect" required class="w-full border border-gray-300 rounded-md p-2 bg-white">
                        <option value="" disabled selected>Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">System Role</label>
                <select id="roleSelect" class="w-full border border-gray-300 rounded-md p-2 bg-white">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <div id="teacherFields" class="hidden space-y-4 border-l-4 border-green-500 pl-3 my-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Assigned Teaching Subject</label>
                    <select id="teacherSubjectSelect" class="w-full border border-gray-300 rounded-md p-2 bg-white">
                        </select>
                </div>
            </div>

            <div id="studentFilters" class="space-y-4 border-l-4 border-blue-500 pl-3 my-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Grade Level</label>
                    <select id="gradeSelect" class="w-full border border-gray-300 rounded-md p-2 bg-white">
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                        <option value="11">Grade 11</option>
                        <option value="12">Grade 12</option>
                    </select>
                </div>
                <div id="streamBox" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Academic Stream</label>
                    <select id="streamSelect" class="w-full border border-gray-300 rounded-md p-2 bg-white">
                        <option value="Natural">Natural Science</option>
                        <option value="Social">Social Science</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Section Assignment</label>
                    <select id="sectionSelect" class="w-full border border-gray-300 rounded-md p-2 bg-white">
                        <option value="A">Section A</option>
                        <option value="B">Section B</option>
                        <option value="C">Section C</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md font-semibold hover:bg-blue-700 transition">Register Account</button>
        </form>

        <div id="credentialsModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
            <div class="bg-white p-6 rounded-lg max-w-sm w-full text-center">
                <h3 class="text-xl font-bold text-green-600 mb-2">Account Created Successfully!</h3>
                <p class="text-sm text-gray-600 mb-4">Please securely copy down your generated entry details:</p>
                <div class="bg-gray-100 p-3 rounded-md mb-4 font-mono text-left space-y-1">
                    <p><strong>Username:</strong> <span id="modalUser"></span></p>
                    <p><strong>Password:</strong> <span id="modalPass"></span></p>
                </div>
                <button onclick="window.location.href='login.html'" class="w-full bg-gray-800 text-white py-2 rounded-md hover:bg-gray-900">Proceed to Login</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const roleSelect = document.getElementById('roleSelect');
        const studentFilters = document.getElementById('studentFilters');
        const teacherFields = document.getElementById('teacherFields');
        const gradeSelect = document.getElementById('gradeSelect');
        const streamBox = document.getElementById('streamBox');
        const teacherSubjectSelect = document.getElementById('teacherSubjectSelect');

        // Dynamically fill out teacher subject options from app.js layout configuration
        AllDistinctSubjects.forEach(sub => {
            const opt = document.createElement('option');
            opt.value = sub;
            opt.innerText = sub.replace(/_/g, ' ');
            teacherSubjectSelect.appendChild(opt);
        });

        // Toggle visibility fields depending on role selections
        roleSelect.addEventListener('change', () => {
            if (roleSelect.value === 'student') {
                studentFilters.classList.remove('hidden');
                teacherFields.classList.add('hidden');
            } else if (roleSelect.value === 'teacher') {
                teacherFields.classList.remove('hidden');
                studentFilters.classList.add('hidden');
            } else {
                teacherFields.classList.add('hidden');
                studentFilters.classList.add('hidden');
            }
        });

        gradeSelect.addEventListener('change', () => {
            if (parseInt(gradeSelect.value) >= 11) {
                streamBox.classList.remove('hidden');
            } else {
                streamBox.classList.add('hidden');
            }
        });

        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const role = roleSelect.value;
            const name = document.getElementById('fullName').value;
            
            // Capture added age and gender fields
            const age = document.getElementById('ageInput').value;
            const gender = document.getElementById('genderSelect').value;

            const creds = DB.generateCredentials(role);

            // Appended age, gender, and reset_token to object mapping values without breaking structural layout
            let newAccount = { 
                name, 
                role, 
                age: parseInt(age),
                gender: gender,
                username: creds.username, 
                password: creds.password,
                reset_token: "12345" 
            };

            if (role === 'student') {
                const grade = gradeSelect.value;
                const stream = (parseInt(grade) >= 11) ? document.getElementById('streamSelect').value : null;
                const section = document.getElementById('sectionSelect').value;
                
                newAccount.grade = grade;
                newAccount.stream = stream;
                newAccount.section = section;
                newAccount.classKey = stream ? `${grade}-${stream}${section}` : `${grade}${section}`;
            } else if (role === 'teacher') {
                // Save specific subject assignment to the teacher's profile
                newAccount.subject = teacherSubjectSelect.value;
            }

            const currentUsers = DB.getUsers();
            currentUsers.push(newAccount);
            DB.saveUsers(currentUsers);

            document.getElementById('modalUser').innerText = creds.username;
            document.getElementById('modalPass').innerText = creds.password;
            document.getElementById('credentialsModal').classList.remove('hidden');
        });
    </script>
</body>
</html>
